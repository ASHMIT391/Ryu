<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Feeling</title>

<style>
body{
margin:0;
background:linear-gradient(180deg,#0f2027,#203a43,#2c5364);
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

h1{
margin-top:60px;
font-size:38px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px cyan}
to{text-shadow:0 0 25px magenta,0 0 35px magenta}
}

.container{
margin-top:40px;
}

button{
display:block;
margin:12px auto;
padding:15px 40px;
font-size:18px;
border:none;
border-radius:12px;
background:#00c3ff;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
background:#ff00ff;
color:white;
}

video{
margin-top:25px;
width:80%;
max-width:500px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

#msg{
margin-top:20px;
color:#ffb3b3;
}

footer{
position:fixed;
bottom:5px;
width:100%;
font-size:12px;
opacity:0.6;
}
</style>
</head>

<body>

<h1>my felling when ryu didn't repply me</h1>

<div class="container">

<button onclick="playVideo('song1.mp4')">Song1</button>
<button onclick="playVideo('song2.mp4')">Song2</button>
<button onclick="playVideo('song3.mp4')">Song3</button>
<button onclick="playVideo('song4.mp4')">Song4</button>
<button onclick="playVideo('song5.mp4')">Song5</button>

<video id="player" controls></video>

<div id="msg"></div>

</div>

<footer>made by ashmit on 3/11/26</footer>

<script>

function playVideo(file){

let player = document.getElementById("player");
player.src = file;

player.play().catch(()=>{
document.getElementById("msg").innerText = "song feeling was not added yet";
});

}

</script>

</body>
</html>
