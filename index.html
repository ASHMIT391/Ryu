<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Feeling</title>

<style>

body{
    margin:0;
    overflow:hidden;
    font-family:Arial;
    background:linear-gradient(180deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}

/* rain */
.rain{
position:fixed;
width:2px;
height:80px;
background:rgba(255,255,255,0.2);
animation:rainfall linear infinite;
}

@keyframes rainfall{
from{transform:translateY(-100vh)}
to{transform:translateY(100vh)}
}

/* title glow */

h1{
margin-top:70px;
font-size:40px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px cyan}
to{text-shadow:0 0 20px magenta,0 0 30px magenta}
}

/* buttons */

.container{
margin-top:80px;
}

button{
display:block;
margin:15px auto;
padding:15px 45px;
font-size:18px;
border:none;
border-radius:12px;
background:#00c3ff;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
background:#ff00ff;
color:white;
}

/* hearts */

.heart{
position:fixed;
bottom:-20px;
font-size:20px;
animation:floatUp 6s linear infinite;
opacity:0.6;
}

@keyframes floatUp{
0%{transform:translateY(0)}
100%{transform:translateY(-110vh)}
}

#msg{
margin-top:30px;
color:#ffb3b3;
}

footer{
position:fixed;
bottom:5px;
width:100%;
font-size:12px;
opacity:0.6;
}

</style>
</head>

<body>

<h1>my felling when ryu didn't repply me</h1>

<div class="container">

<button onclick="playSong('song1.mp3')">Song1</button>
<button onclick="playSong('song2.mp3')">Song2</button>
<button onclick="playSong('song3.mp3')">Song3</button>
<button onclick="playSong('song4.mp3')">Song4</button>
<button onclick="playSong('song5.mp3')">Song5</button>

<div id="msg"></div>

</div>

<footer>made by ashmit on 3/11/26</footer>

<script>

/* rain generator */

for(let i=0;i<120;i++){
let drop=document.createElement("div")
drop.className="rain"
drop.style.left=Math.random()*100+"vw"
drop.style.animationDuration=(0.5+Math.random())+"s"
drop.style.opacity=Math.random()
document.body.appendChild(drop)
}

/* heart generator */

setInterval(()=>{
let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤"
heart.style.left=Math.random()*100+"vw"
heart.style.animationDuration=(4+Math.random()*3)+"s"
document.body.appendChild(heart)

setTimeout(()=>heart.remove(),7000)

},800)

/* audio player */

let audio=new Audio()

function playSong(file){

audio.src=file

audio.play().catch(()=>{
document.getElementById("msg").innerText="song feeling was not added yet"
})

}

</script>

</body>
</html>
